<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams Connect</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1b1a19; color: white; font-family: sans-serif; overflow: hidden; }
        #waiting-room, #ai-stage, #cam-stage, #final-stage { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* شاشة البداية ظاهرة دائماً */
        #waiting-room { display: flex; z-index: 10; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #6264a7; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* شاشة الدردشة */
        #ai-stage { background: #0b0b0b; padding: 20px; }
        .bubble { background: #202123; padding: 15px; border-radius: 15px 15px 15px 0; border: 1px solid #333; margin: 20px; max-width: 80%; }

        /* شاشة الكاميرا المعطلة - تأثير مضمون */
        #cam-stage { background: black; }
        .noise-effect { width: 100%; height: 100%; background: url('https://media.giphy.com/media/oEI9uWUPr9LsA/giphy.gif'); background-size: cover; opacity: 0.3; }
        .cam-label { position: absolute; top: 20px; right: 20px; background: red; padding: 5px 10px; font-weight: bold; }

        input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #1a1a1a; color: white; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; background: #6264a7; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="waiting-room" onclick="startSequence()">
        <div class="spinner"></div>
        <h2 id="status">جاري التحقق من الهوية...</h2>
        <p style="color: #666;">(انقر هنا للبدء)</p>
    </div>

    <div id="ai-stage">
        <div id="typing" style="color: #6264a7;">الذكاء الاصطناعي يكتب...</div>
        <div id="msg" class="bubble" style="display:none;"></div>
        <div id="input-area" style="display:none; width: 100%;">
            <input type="text" id="uname" placeholder="اكتب اسمك هنا...">
            <button onclick="goToCam()">إرسال</button>
        </div>
    </div>

    <div id="cam-stage">
        <div class="noise-effect"></div>
        <div class="cam-label">🔴 LIVE</div>
        <div style="position: absolute; color: white; font-family: monospace;">CONNECTING TO CLASS_CAM_04...</div>
    </div>

    <div id="final-stage">
        <h1 style="color: #0f0; font-size: 5rem; margin: 0;">T10T</h1>
        <h1 style="color: white; font-size: 3rem; margin: 0;">عــــمــــك</h1>
    </div>

    <script>
        function startSequence() {
            document.getElementById('status').innerText = "تم الاتصال بنجاح!";
            setTimeout(() => {
                document.getElementById('waiting-room').style.display = 'none';
                document.getElementById('ai-stage').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('typing').style.display = 'none';
                    document.getElementById('msg').innerText = "مرحبا، أنا هكر الذكاء الاصطناعي الذي أمرني سيدي محمد بتهكير كاميرا الصف. اكتب اسمك لإثبات هويتك 😁";
                    document.getElementById('msg').style.display = 'block';
                    document.getElementById('input-area').style.display = 'block';
                }, 2000);
            }, 7000); // 7 ثواني انتظار
        }

        function goToCam() {
            if (!document.getElementById('uname').value) return;
            document.getElementById('ai-stage').style.display = 'none';
            document.getElementById('cam-stage').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('cam-stage').style.display = 'none';
                document.getElementById('final-stage').style.display = 'flex';
            }, 20000); // 20 ثانية تشويش
        }
    </script>
</body>
</html>
