<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Microsoft Teams - Session</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1b1a19; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .stage { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; height: 100%; }
        
        /* شاشة البداية */
        #waiting-room { display: flex; z-index: 1; padding: 20px; box-sizing: border-box; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #6264a7; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* شاشة الدردشة - تصميم تطبيقات حقيقية */
        #ai-stage { background: #0b0b0b; padding: 15px; box-sizing: border-box; justify-content: flex-start; }
        .chat-container { width: 100%; max-width: 400px; margin-top: 50px; display: flex; flex-direction: column; align-items: flex-start; }
        .chat-bubble { 
            background: #202123; 
            padding: 15px; 
            border-radius: 18px 18px 18px 2px; 
            border: 1px solid #333; 
            margin: 10px 0; 
            line-height: 1.6; 
            font-size: 1.1rem; 
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* شاشة الكاميرا */
        #cam-stage { background: black; }
        .static-noise { width: 100%; height: 100%; background: url('https://media.giphy.com/media/oEI9uWUPr9LsA/giphy.gif'); background-size: cover; opacity: 0.2; }
        .red-dot { position: absolute; top: 30px; right: 30px; background: red; padding: 5px 15px; border-radius: 5px; font-weight: bold; animation: blink 1s infinite; z-index: 10; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* شاشة النهاية */
        #final-stage { background: black; color: #0f0; }

        /* واجهة الإدخال */
        #input-area { width: 100%; position: absolute; bottom: 30px; left: 0; padding: 0 20px; box-sizing: border-box; }
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #444; 
            background: #1a1a1a; 
            color: white; 
            font-size: 1rem; 
            outline: none; 
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button { width: 100%; padding: 15px; background: #6264a7; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="waiting-room" class="stage">
        <div class="spinner"></div>
        <h2 id="status">جاري التحقق من الهوية...</h2>
        <p style="color: #888;">الرجاء الانتظار، يتم الاتصال بخادم المدرسة</p>
        <button onclick="startApp()" id="start-btn" style="margin-top: 20px; background: #6264a7;">بدء الجلسة</button>
    </div>

    <div id="ai-stage" class="stage">
        <div class="chat-container">
            <div id="typing" style="color: #6264a7; font-size: 0.9rem; margin-bottom: 5px; margin-right: 10px;">الذكاء الاصطناعي يكتب الآن...</div>
            <div id="ai-msg" class="chat-bubble" style="display:none;"></div>
        </div>
        <div id="input-area" style="display:none;">
            <input type="text" id="username" placeholder="اكتب اسمك هنا للإثبات...">
            <button onclick="toCamera()" style="background: #0078d4;">إرسال وتفعيل البث</button>
        </div>
    </div>

    <div id="cam-stage" class="stage">
        <div class="static-noise"></div>
        <div class="red-dot">🔴 LIVE</div>
        <div style="position: absolute; font-family: monospace; font-size: 1.1rem; letter-spacing: 1px; width: 100%;">
            ACCESSING_CLASS_CAM_04... <br>
            <span style="font-size: 0.8rem; color: #555;">ENCRYPTED STREAM BY T10T</span>
        </div>
    </div>

    <div id="final-stage" class="stage">
        <h1 style="font-size: 6rem; margin: 0; text-shadow: 0 0 20px #0f0;">T10T</h1>
        <h1 style="color: white; font-size: 3.5rem; margin: 0;">عــــمــــك</h1>
        <p style="color: #555; margin-top: 20px;">System Bypassed Successfully</p>
    </div>

    <script>
        function openFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }

        function startApp() {
            // تفعيل الشاشة الكاملة فور الضغط
            openFullscreen();

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').innerText = "تم التحقق! جاري فتح الكاميرا المهكرة...";
            
            setTimeout(() => {
                document.getElementById('waiting-room').style.display = 'none';
                document.getElementById('ai-stage').style.display = 'flex';
                
                setTimeout(() => {
                    document.getElementById('typing').style.display = 'none';
                    const msg = "مرحبا، أنا هكر الذكاء الاصطناعي الذي أمرني سيدي محمد بتهكير كاميرا الصف. اكتب اسمك لإثبات هويتك 😁";
                    document.getElementById('ai-msg').innerText = msg;
                    document.getElementById('ai-msg').style.display = 'block';
                    document.getElementById('input-area').style.display = 'block';
                }, 2000);
            }, 7000);
        }

        function toCamera() {
            if(!document.getElementById('username').value) return;
            
            document.getElementById('ai-stage').style.display = 'none';
            document.getElementById('cam-stage').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('cam-stage').style.display = 'none';
                document.getElementById('final-stage').style.display = 'flex';
            }, 20000);
        }
    </script>
</body>
</html>
