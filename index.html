<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Microsoft Teams - Live Session</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #11100f; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* شاشة انتظار تيمز الحقيقية */
        #waiting-room { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1b1a19; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .teams-icon { width: 80px; margin-bottom: 20px; }
        .pulse { width: 20px; height: 20px; background: #6264a7; border-radius: 50%; animation: pulse 1.5s infinite; margin-top: 20px; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }

        /* شاشة المصفوفة (Matrix) */
        #matrix-stage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 900; }
        canvas { display: block; opacity: 0.4; }
        .overlay-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        
        /* كاميرا مشوشة */
        #cam-glitch { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://media.giphy.com/media/oEI9uWUicv05i/giphy.gif') center/cover; z-index: 1100; opacity: 0.2; }
        
        /* إشعارات وهمية */
        .notif { position: fixed; top: -100px; left: 5%; width: 90%; background: rgba(30,30,30,0.9); border: 1px solid #444; border-radius: 10px; padding: 10px; display: flex; align-items: center; color: white; font-size: 0.8rem; z-index: 2000; transition: top 0.5s; }
        .notif-icon { color: #f00; margin-left: 10px; }

        /* المرحلة النهائية */
        #final-stage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 3000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .white-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 4000; display: none; }
    </style>
</head>
<body onclick="startExperience()">

    <div id="waiting-room">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Microsoft_Office_Teams_%282018%E2%80%93present%29.svg" class="teams-icon">
        <h3 style="margin-bottom: 5px;">بانتظار سماح المنظم بالدخول...</h3>
        <p style="color: #a19f9d; font-size: 0.9rem;">بث كاميرا الصف: غرفة 4</p>
        <div class="pulse"></div>
        <button id="entry-btn" style="margin-top: 40px; background: #6264a7; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">دخول مباشر (بصلاحية مبرمج)</button>
    </div>

    <div id="notification" class="notif">
        <span class="notif-icon">⚠️</span>
        <span id="notif-msg">تم اختراق ملفات النظام...</span>
    </div>

    <div id="matrix-stage">
        <canvas id="canvas"></canvas>
        <div class="overlay-text">
            <h1 style="color: #0f0; font-size: 2rem; text-shadow: 0 0 10px #0f0;">T10T HACK_SYSTEM v2.0</h1>
            <p style="color: white;">Bypassing Teams Firewall...</p>
        </div>
    </div>

    <div id="cam-glitch"></div>

    <div id="final-stage">
        <h1 style="color: #0f0; font-size: 5rem; margin: 0;">T10T</h1>
        <h2 style="color: white;">سـيـد الـنـظـام</h2>
        <div id="progress-box" style="width: 80%; height: 10px; background: #222; margin: 20px; border-radius: 5px;">
            <div id="bar" style="width: 0%; height: 100%; background: #0f0;"></div>
        </div>
        <p id="status-end" style="color: #aaa;">جاري مسح الصور والرسائل...</p>
    </div>

    <div id="flash" class="white-flash"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns;
        const fontSize = 16;

        function initMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
        }
        
        const drops = [];
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        let step = 0;
        function startExperience() {
            if (step !== 0) return;
            step = 1;
            
            // صوت وش (صناعي)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            document.getElementById('entry-btn').innerText = "جاري كسر التشفير...";
            
            setTimeout(() => {
                document.getElementById('waiting-room').style.display = 'none';
                document.getElementById('matrix-stage').style.display = 'block';
                initMatrix();
                for (let i = 0; i < columns; i++) drops[i] = 1;
                setInterval(drawMatrix, 33);
                
                // سلسلة الرعب
                setTimeout(() => { showNotif("تم الوصول للكاميرا الأمامية..."); }, 2000);
                setTimeout(() => { 
                    document.getElementById('cam-glitch').style.display = 'block';
                    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
                }, 4000);
                setTimeout(() => { 
                    document.getElementById('final-stage').style.display = 'flex';
                    startFinalLoading(oscillator, audioCtx);
                }, 7000);
            }, 2000);
        }

        function showNotif(msg) {
            const n = document.getElementById('notification');
            document.getElementById('notif-msg').innerText = msg;
            n.style.top = '20px';
            setTimeout(() => { n.style.top = '-100px'; }, 3000);
        }

        function startFinalLoading(osc, actx) {
            let p = 0;
            const int = setInterval(() => {
                p++;
                document.getElementById('bar').style.width = p + '%';
                if (p === 70) {
                    document.body.style.animation = "shake 0.1s infinite";
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
                if (p >= 100) {
                    clearInterval(int);
                    document.getElementById('flash').style.display = 'block';
                    osc.stop();
                    setTimeout(() => {
                        document.getElementById('flash').style.display = 'none';
                        renderEnd();
                    }, 500);
                }
            }, 100);
        }

        function renderEnd() {
            document.getElementById('final-stage').innerHTML = `
                <h1 style="color:#0f0; font-size:4rem;">T10T عـــمـــك</h1>
                <p style="color:white;">تـعـيـش وتـوكـل غـيـرهـا يا بطل 😂</p>
                <button onclick="location.reload()" style="background:#0f0; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">طمن قلبك (خروج)</button>
            `;
        }
    </script>
    <style>
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
    </style>
</body>
</html>
