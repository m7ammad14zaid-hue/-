<div id="ai-chat-stage" style="display:none; position:fixed; inset:0; background:#0b0b0b; z-index:1500; flex-direction:column; padding:20px; font-family:sans-serif;">
    <div id="chat-container" style="flex-grow:1; display:flex; flex-direction:column; justify-content:flex-end;">
        <div id="ai-message" style="background:#202123; color:white; padding:15px; border-radius:15px 15px 15px 0; margin-bottom:20px; max-width:85%; line-height:1.6; border:1px solid #333; display:none;">
            </div>
        <div id="typing-indicator" style="color:#aaa; font-size:0.8rem; margin-bottom:10px; display:none;">الذكاء الاصطناعي يكتب الآن...</div>
    </div>
    
    <div id="input-area" style="display:none; gap:10px; padding-bottom:20px;">
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا..." style="flex-grow:1; padding:12px; border-radius:8px; border:1px solid #444; background:#1a1a1a; color:white; outline:none;">
        <button onclick="proceedToHacking()" style="background:#0078d4; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">إرسال</button>
    </div>
</div>
